name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .dart_define
        if: vars.DART_DEFINE_CONTENTS != ''
        env:
          DART_DEFINE_CONTENTS: ${{ vars.DART_DEFINE_CONTENTS }}
        run: echo "$DART_DEFINE_CONTENTS" > .dart_defines

      - name: Restore Pods cache
        uses: actions/cache@v4
        with:
          path: |
            flutter_app/ios/Pods
            ~/.cocoapods/repos
          key: pods-${{ runner.os }}-${{ hashFiles('flutter_app/ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Flutter pub get
        run: flutter pub get
        working-directory: flutter_app

      - name: Build runner
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: flutter_app

      - name: Install certificate and provisioning profile
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          set -e
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$IOS_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          TEAM_ID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract TeamIdentifier.0 raw -)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Build IPA (release, signed)
        env:
          ADMOB_IOS_APP_ID: ${{ secrets.ADMOB_IOS_APP_ID }}
        run: |
          cat > ios/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.myu-mikazuki.kagibus</key>
                  <string>${PROFILE_UUID}</string>
              </dict>
          </dict>
          </plist>
          PLIST

          if [ -n "$ADMOB_IOS_APP_ID" ]; then
            sed -i '' "s|ADMOB_APP_ID = .*|ADMOB_APP_ID = $ADMOB_IOS_APP_ID|" ios/Flutter/Release.xcconfig
          fi

          DART_DEFINE_ARGS=""
          if [ -f "$GITHUB_WORKSPACE/.dart_defines" ]; then
            DART_DEFINE_ARGS=$(python3 -c "import json; d=json.load(open('$GITHUB_WORKSPACE/.dart_defines')); print(' '.join(f'--dart-define={k}={v}' for k, v in d.items()))")
          fi

          flutter build ios --release --no-codesign $DART_DEFINE_ARGS

          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$GITHUB_WORKSPACE/build/Runner.xcarchive" \
            "PROFILE_SPECIFIER=$PROFILE_UUID" \
            "DEVELOPMENT_TEAM=$TEAM_ID"

          xcodebuild -exportArchive \
            -archivePath "$GITHUB_WORKSPACE/build/Runner.xcarchive" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath "$GITHUB_WORKSPACE/build/ios/ipa"
        working-directory: flutter_app

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

      - name: Rename IPA
        run: |
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          mv "$IPA" "kagi_bus-${{ github.ref_name }}-ios.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: kagi_bus-${{ github.ref_name }}-ios.ipa
          if-no-files-found: error

      - name: Cleanup signing
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .dart_define
        if: vars.DART_DEFINE_CONTENTS != ''
        env:
          DART_DEFINE_CONTENTS: ${{ vars.DART_DEFINE_CONTENTS }}
        run: echo "$DART_DEFINE_CONTENTS" > .dart_defines

      - name: Flutter pub get
        run: flutter pub get
        working-directory: flutter_app

      - name: Build runner
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: flutter_app

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p flutter_app/android/app/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > flutter_app/android/app/keystore/kagi_bus.jks

      - name: Build APK (release)
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/flutter_app/android/app/keystore/kagi_bus.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          DART_DEFINE_ARGS=""
          if [ -f "$GITHUB_WORKSPACE/.dart_defines" ]; then
            DART_DEFINE_ARGS=$(python3 -c "import json; d=json.load(open('$GITHUB_WORKSPACE/.dart_defines')); print(' '.join(f'--dart-define={k}={v}' for k, v in d.items()))")
          fi
          flutter build apk --release $DART_DEFINE_ARGS
        working-directory: flutter_app

      - name: Cleanup keystore
        if: always()
        run: rm -f flutter_app/android/app/keystore/kagi_bus.jks

      - name: Rename APK
        run: mv flutter_app/build/app/outputs/flutter-apk/app-release.apk kagi_bus-${{ github.ref_name }}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: kagi_bus-${{ github.ref_name }}-android.apk
          if-no-files-found: error

  release:
    needs: [build-ios, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/*
