name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .dart_define
        if: vars.DART_DEFINE_CONTENTS != ''
        env:
          DART_DEFINE_CONTENTS: ${{ vars.DART_DEFINE_CONTENTS }}
        run: echo "$DART_DEFINE_CONTENTS" > .dart_defines

      - name: Restore Pods cache
        uses: actions/cache@v4
        with:
          path: |
            flutter_app/ios/Pods
            ~/.cocoapods/repos
          key: pods-${{ runner.os }}-${{ hashFiles('flutter_app/ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Flutter pub get
        run: flutter pub get
        working-directory: flutter_app

      - name: Build runner
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: flutter_app

      - name: Build iOS (release, no codesign)
        run: |
          DART_DEFINE_ARGS=""
          if [ -f "$GITHUB_WORKSPACE/.dart_defines" ]; then
            DART_DEFINE_ARGS=$(python3 -c "import json; d=json.load(open('$GITHUB_WORKSPACE/.dart_defines')); print(' '.join(f'--dart-define={k}={v}' for k, v in d.items()))")
          fi
          flutter build ios --no-codesign --release $DART_DEFINE_ARGS
        working-directory: flutter_app

      - name: Create IPA
        run: |
          APP_PATH=$(find flutter_app/build/ios/iphoneos -name "*.app" -type d | head -1)
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -rq "kagi_bus-${{ github.ref_name }}-ios.ipa" Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/kagi_bus-${{ github.ref_name }}-ios.ipa
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .dart_define
        if: vars.DART_DEFINE_CONTENTS != ''
        env:
          DART_DEFINE_CONTENTS: ${{ vars.DART_DEFINE_CONTENTS }}
        run: echo "$DART_DEFINE_CONTENTS" > .dart_defines

      - name: Flutter pub get
        run: flutter pub get
        working-directory: flutter_app

      - name: Build runner
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: flutter_app

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p flutter_app/android/app/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > flutter_app/android/app/keystore/kagi_bus.jks

      - name: Build APK (release)
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/flutter_app/android/app/keystore/kagi_bus.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          DART_DEFINE_ARGS=""
          if [ -f "$GITHUB_WORKSPACE/.dart_defines" ]; then
            DART_DEFINE_ARGS=$(python3 -c "import json; d=json.load(open('$GITHUB_WORKSPACE/.dart_defines')); print(' '.join(f'--dart-define={k}={v}' for k, v in d.items()))")
          fi
          flutter build apk --release $DART_DEFINE_ARGS
        working-directory: flutter_app

      - name: Cleanup keystore
        if: always()
        run: rm -f flutter_app/android/app/keystore/kagi_bus.jks

      - name: Rename APK
        run: mv flutter_app/build/app/outputs/flutter-apk/app-release.apk kagi_bus-${{ github.ref_name }}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: kagi_bus-${{ github.ref_name }}-android.apk
          if-no-files-found: error

  release:
    needs: [build-ios, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/*
