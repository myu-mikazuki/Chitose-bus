name: kagi_bus
description: Kagi-Bus - 千歳科学技術大学 バス時刻表アプリ
flutter_native_splash:
  color: "#FE9616"
  image: assets/icon/icon_adaptive_foreground.png
  android_12:
    color: "#FE9616"
    image: assets/icon/icon_adaptive_foreground.png

flutter_launcher_icons:
  ios: true
  image_path: "assets/icon/icon_ios.png"

  remove_alpha_ios: true

  android: true
  adaptive_icon_background: "assets/icon/icon_adaptive_background.png"
  adaptive_icon_foreground: "assets/icon/icon_adaptive_foreground.png"


publish_to: 'none'

version: 0.7.3+13

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  http: ^1.2.1
  intl: ^0.19.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_local_notifications: ^18.0.0
  shared_preferences: ^2.3.0
  timezone: ^0.9.4
  url_launcher: ^6.3.0
  package_info_plus: ^9.0.0
  google_mobile_ads: ^5.1.0
  firebase_core: ^4.6.0
  firebase_crashlytics: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.10
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  mocktail: ^1.0.4
  fake_async: ^1.3.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansJP
      fonts:
        - asset: fonts/NotoSansJP-Regular.ttf
